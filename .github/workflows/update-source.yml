name: Update AltStore Source

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # Uses minute 17 to avoid the :00/:30 stampede.
    - cron: "17 */6 * * *"
  push:
    paths:
      - "ipas/**"
      - "scripts/generate_repo.py"
      - "sources.json"
      - ".github/workflows/update-source.yml"
  workflow_dispatch:

# Prevent concurrent runs from stacking up.
concurrency:
  group: altstore-source
  cancel-in-progress: true

jobs:
  update-source:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run source generator
        id: generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_repo.py --fetch --github-token="$GH_TOKEN"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add repo.json icons/ ipas/

          # Only commit if there's something to commit.
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update AltStore source" -m "Automated update from GitHub Actions."

          git push
